<app-overview-header>
  <h3 i18n>Anvendelses historik</h3>

  <app-grid-options-button entityType="it-system-archive" [hasResetButton]="true"></app-grid-options-button>
  <app-export-menu-button [exportMethod]="onExcelExport"></app-export-menu-button>
  <app-hide-show-button [columns]="gridColumns$ | async" entityType="it-system-archive"
    [isSecondary]="true"></app-hide-show-button>
</app-overview-header>

<app-grid [data$]="gridData$" [columns$]="gridColumns$" [loading]="isLoading$ | async" [state]="gridState$ | async"
  [deletePermission]="hasDeletePermission$ | async" [exportToExcelName]="'Anvendelses historik Overblik'"
  i18n-exportToExcelName entityType="it-system-archive" (stateChange)="stateChange($event)"
  (deleteEvent)="onDeleteEvent($event)"></app-grid>
