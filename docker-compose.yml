services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      BACKEND_URL: ${BACKEND_URL:-https://kitos-dev.strongminds.dk/}
    volumes:
      - .:/app
      - /app/node_modules
    command: sh ./docker/start-dev.sh ${BACKEND_URL:-https://kitos-dev.strongminds.dk/}
